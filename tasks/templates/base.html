<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>CORE SYSTEM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #020617;
            --accent: #6366f1;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: radial-gradient(circle at top, #111827, #020617);
            color: white;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        /* ניווט */
        .navbar {
            background: rgba(0, 0, 0, 0.6) !important;
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
            padding: 1.2rem 0;
        }

        .navbar-brand { font-weight: 800; letter-spacing: 0.1em; }

        /* כרטיסים (Cards) */
        .card {
            background: rgba(15, 23, 42, 0.6) !important;
            backdrop-filter: blur(10px);
            border: 1px solid var(--border) !important;
            border-radius: 24px !important;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* טבלאות */
        .table { --bs-table-bg: transparent !important; color: #cbd5e1 !important; }
        thead th {
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            color: #64748b !important;
            border-bottom: 1px solid var(--border) !important;
            padding: 1.5rem !important;
        }
        tbody td { padding: 1.5rem !important; border-bottom: 1px solid rgba(255,255,255,0.02) !important; }

        /* כפתורים */
        .btn {
            border-radius: 12px !important;
            padding: 0.7rem 1.5rem !important;
            font-weight: 600 !important;
            text-transform: uppercase !important;
            font-size: 0.75rem !important;
            transition: all 0.3s ease !important;
        }
        .btn-primary { background: var(--accent) !important; border: none !important; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.4); }

        /* טפסים (Forms) */
        input, select, textarea {
            background-color: rgba(0, 0, 0, 0.3) !important;
            border: 1px solid var(--border) !important;
            color: white !important;
            border-radius: 12px !important;
            padding: 12px !important;
        }
        input:focus { border-color: var(--accent) !important; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1) !important; }
        label { color: #94a3b8; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; margin-bottom: 8px; }

        /* תגיות סטטוס */
        .badge { padding: 8px 12px !important; border-radius: 8px !important; font-weight: 700 !important; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand" href="{% url 'index' %}">CORE<span class="text-primary">SYSTEM</span></a>
        <div class="d-flex gap-2">
            {% if user.is_authenticated %}
                <a class="btn btn-outline-light border-0" href="{% url 'task_list' %}">Registry</a>
                <a class="btn btn-outline-danger border-0" href="{% url 'logout' %}">Exit</a>
            {% else %}
                <a class="btn btn-outline-light border-0" href="{% url 'login' %}">Login</a>
                <a class="btn btn-primary" href="{% url 'register' %}">Register</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container py-5">
    {% block content %}{% endblock %}
</div>

</body>
</html>
