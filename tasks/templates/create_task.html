{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-5 border-0 shadow-lg" style="border-top: 4px solid #10b981 !important;">
            <div class="mb-4">
                <h6 class="text-success fw-bold text-uppercase mb-1" style="letter-spacing: 0.2em;">Task Creation</h6>
                <h2 class="fw-800 text-uppercase mb-0 tracking-tighter">New Record</h2>
                <p class="text-muted small uppercase tracking-widest mt-1">Initialize a new system assignment</p>
            </div>

            <form method="post">
                {% csrf_token %}
                <div class="form-container mb-4">
                    {{ form.as_p }}
                </div>
                <button type="submit" class="btn btn-success w-100 py-3 fw-bold uppercase shadow-sm">
                    Create & Deploy
                </button>
            </form>

            <div class="mt-4 text-center border-top border-white/5 pt-3">
                <a href="{% url 'task_list' %}" class="text-muted small text-decoration-none uppercase fw-bold hover-opacity">
                    ← Back to Registry
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
