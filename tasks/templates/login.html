{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-4">
        <div class="card p-5 border-0 shadow-lg">
            <div class="text-center mb-4">
                <h3 class="fw-800 text-uppercase tracking-tighter">Login</h3>
                <p class="text-muted small uppercase tracking-widest">Access Core System</p>
            </div>
            <form method="post">
                {% csrf_token %}
                <div class="form-container mb-4">
                    {{ form.as_p }}
                </div>
                <button type="submit" class="btn btn-primary w-100 py-3 shadow-glow">Authorize</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
